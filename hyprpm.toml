[repository]
name = "HyprGlass"
authors = ["Hyprnux"]
description = "Apple-style Liquid Glass effect for Hyprland"

# Map a Hyprland release commit -> the hyprglass commit that builds against it.
# hyprpm reads the user's running Hyprland commit, finds the matching pin, and
# resets this repo to the paired commit before building. If no pin matches it
# falls back to the default branch (main) HEAD, which always targets the latest
# Hyprland (see .hyprland-version). New pins are appended automatically on each
# release (.github/workflows/release.yml).
commit_pins = [
  ["dd220efe7b1e292415bd0ea7161f63df9c95bfd3", "fc65c63f04f96f7ec2c1e54acee50f460d543cd1"], # hyprland 0.53.3 -> hyprglass v0.2.1
  ["0002f148c9a4fe421a9d33c0faa5528cdc411e62", "05542151271f5cdcc55e41cda44ab02397d9d87b"], # hyprland 0.54.0 -> hyprglass v0.2.3
  ["4b07770b9ef1cceb2e6f56d33538aaffb9186b9c", "c0b167a268557ce244cd512ce5379ea5acbc999e"], # hyprland 0.54.1 -> hyprglass v0.2.5
  ["59f9f2688ac508a0584d1462151195a6c4992f99", "bb50b59f558c935a7898acbd03fe1682c00d898f"], # hyprland 0.54.2 -> hyprglass v0.3.0
  ["521ece463c4a9d3d128670688a34756805a4328f", "b4a9eedf95579453b035e1012b76a23f2216a0d0"], # hyprland 0.54.3 -> hyprglass v0.5.0
  ["af923e30d1d24f1f4a4f5cb8308065173c1d9539", "f30a1962b520e4f8471b9e353cd2977713bc0a57"], # hyprland 0.55.0 -> hyprglass v0.6.2
  ["a47147bc095e5b3be3eb8bd04f0ac242b968cd4d", "f30a1962b520e4f8471b9e353cd2977713bc0a57"], # hyprland 0.55.1 -> hyprglass v0.6.2
  ["39d7e209c79d451efab1b21151d5938289da838d", "f30a1962b520e4f8471b9e353cd2977713bc0a57"], # hyprland 0.55.2 -> hyprglass v0.6.2
]

[hyprglass]
description = "Liquid Glass window decoration effect"
output = "hyprglass.so"
build = ["make"]
